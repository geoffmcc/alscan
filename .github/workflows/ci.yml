name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run CLI tests
        run: pytest -v --ignore=tests/gui

      - name: Install GUI dependencies
        run: |
          pip install -e ".[gui]"
          pip install pytest-qt

      - name: Run GUI tests
        run: QT_QPA_PLATFORM=offscreen pytest -v tests/gui/ tests/test_services.py

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: macos-26
            exe_name: alscan-macos
          - os: windows-latest
            exe_name: alscan-windows.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .[gui]

      - name: Build CLI standalone executable
        run: pyinstaller --onefile --name ${{ matrix.exe_name }} --collect-submodules alscan.checks --collect-submodules alscan.report src/alscan/cli.py

      - name: Build GUI standalone executable
        run: pyinstaller --onefile --name ${{ matrix.exe_name }}-gui --collect-submodules alscan.checks --collect-submodules alscan.report --collect-submodules alscan.gui --collect-submodules alscan.services src/alscan/gui/app.py

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/${{ matrix.exe_name }}*
            dist/${{ matrix.exe_name }}-gui*
